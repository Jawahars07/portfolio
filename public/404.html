<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — this room is empty</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,560;1,430&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#F5EFE2;font-family:'Fraunces',serif;text-align:center;padding:24px}
    .code{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.2em;color:#AC3A1B}
    h1{font-size:clamp(40px,8vw,84px);font-weight:560;color:#1C1814;margin:0;line-height:1.05}
    h1 em{font-style:italic;font-weight:430;color:#D94F2B}
    p{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#5C5246;max-width:42ch}
    a{display:inline-block;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:#F5EFE2;background:#1C1814;padding:13px 26px;border-radius:4px;text-decoration:none;box-shadow:4px 4px 0 rgba(28,24,20,.25)}
    a:hover{background:#D94F2B}
    .glyph{font-size:64px;color:#E8861B}
  </style>
</head>
<body>
  <div class="code">EX·404</div>
  <h1>this room is <em>empty</em>.</h1>
  <p>the piece you're looking for was never hung here — or it's out on loan.</p>
  <div class="glyph">జ</div>
  <a href="/">back to the entrance</a>
</body>
</html>
